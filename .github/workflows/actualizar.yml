name: Actualizar resultados Baloto
on:
  schedule:
    - cron: '0 3 * * 3'
    - cron: '0 3 * * 5'
    - cron: '0 3 * * 6'
  workflow_dispatch:
jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml
      - name: Correr scraper
        run: python scripts/scraper.py
      - name: Commit y push
        run: |
          git config user.name "Baloto Bot"
          git config user.email "bot@baloto-stats"
          git add -A
          git diff --staged --quiet || git commit -m "Actualizar resultados"
          git push
