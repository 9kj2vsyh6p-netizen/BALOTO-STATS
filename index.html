<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#0f1117"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Baloto Stats"/>
  <meta name="description" content="Generador estadístico para Baloto, Baloto Revancha y Miloto Colombia"/>
  <title>Baloto Stats</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <style>
    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #22263a;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #f0f2f8;
      --text2: #8b90a7;
      --text3: #565b73;
      --blue: #4a8fff;
      --blue-bg: rgba(74,143,255,0.12);
      --green: #3ecf8e;
      --green-bg: rgba(62,207,142,0.12);
      --amber: #f59e0b;
      --amber-bg: rgba(245,158,11,0.12);
      --red: #f87171;
      --red-bg: rgba(248,113,113,0.10);
      --purple: #a78bfa;
      --purple-bg: rgba(167,139,250,0.12);
      --radius: 14px;
      --radius-sm: 9px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow-x: hidden; }
    #splash { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.4s; }
    #splash .logo-big { font-size: 64px; margin-bottom: 16px; }
    #splash h1 { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    #splash p { font-size: 14px; color: var(--text2); }
    #splash .bar { width: 120px; height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 32px; overflow: hidden; }
    #splash .bar-fill { height: 100%; width: 0%; background: var(--blue); border-radius: 2px; animation: load 1.2s ease forwards; }
    @keyframes load { to { width: 100%; } }
    #app { display: flex; flex-direction: column; min-height: 100vh; max-width: 480px; margin: 0 auto; }
    header { padding: 20px 20px 0; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .app-title { font-size: 20px; font-weight: 700; }
    .app-title span { color: var(--blue); }
    .header-badge { font-size: 11px; background: var(--green-bg); color: var(--green); padding: 4px 10px; border-radius: 20px; font-weight: 600; }
    .game-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .gtab { flex: 1; padding: 10px 6px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.18s; }
    .gtab .tab-emoji { display: block; font-size: 20px; margin-bottom: 3px; }
    .gtab.active { border-color: var(--blue); background: var(--blue-bg); color: var(--blue); }
    .gtab:active { transform: scale(0.96); }
    .game-pill { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px; display: flex; gap: 16px; flex-wrap: wrap; }
    .pill-item { font-size: 12px; color: var(--text2); }
    .pill-item strong { display: block; color: var(--text); font-size: 14px; font-weight: 600; margin-bottom: 1px; }
    .section-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .algo-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 20px; scrollbar-width: none; }
    .algo-scroll::-webkit-scrollbar { display: none; }
    .algo-chip { flex-shrink: 0; padding: 10px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg2); cursor: pointer; text-align: center; min-width: 100px; transition: all 0.18s; }
    .algo-chip.active { border-color: var(--purple); background: var(--purple-bg); }
    .algo-chip:active { transform: scale(0.95); }
    .algo-chip .chip-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    .algo-chip .chip-name { font-size: 11px; font-weight: 600; color: var(--text2); }
    .algo-chip.active .chip-name { color: var(--purple); }
    .method-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px; }
    .method-box h3 { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    .method-box p { font-size: 12px; color: var(--text2); line-height: 1.6; }
    .controls { display: flex; gap: 10px; margin-bottom: 24px; align-items: stretch; }
    .qty-wrap { display: flex; flex-direction: column; gap: 4px; }
    .qty-wrap label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .qty-wrap select { padding: 0 12px; height: 50px; border-radius: var(--radius-sm); border: 1.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 15px; font-weight: 600; appearance: none; -webkit-appearance: none; cursor: pointer; }
    .gen-btn { flex: 1; height: 50px; border-radius: var(--radius); border: none; background: var(--blue); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.18s; letter-spacing: 0.01em; }
    .gen-btn:active { transform: scale(0.97); background: #2e73e8; }
    .combo-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .combo-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .combo-lbl { font-size: 12px; color: var(--text3); font-weight: 600; }
    .combo-score { font-size: 11px; background: var(--green-bg); color: var(--green); padding: 3px 10px; border-radius: 20px; font-weight: 700; }
    .balls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .ball { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
    .ball-main { background: #1c2f52; color: #7db8ff; border: 1.5px solid #2d4b7a; }
    .ball-super-baloto { background: #2e1f08; color: #f59e0b; border: 1.5px solid #5a3d10; width: 46px; height: 46px; font-size: 15px; }
    .ball-super-millon { background: #0d2b1a; color: #3ecf8e; border: 1.5px solid #1a5c3a; width: 46px; height: 46px; font-size: 15px; }
    .ball-sep { color: var(--text3); font-size: 20px; margin: 0 2px; }
    .stats-section { margin-top: 8px; margin-bottom: 24px; }
    .stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
    .stat-box h3 { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .freq-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .freq-n { font-size: 12px; font-weight: 700; color: var(--text); min-width: 26px; text-align: right; }
    .freq-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .freq-fill-hot { height: 100%; background: #f87171; border-radius: 3px; }
    .freq-fill-cold { height: 100%; background: #3ecf8e; border-radius: 3px; }
    .freq-val { font-size: 11px; color: var(--text3); min-width: 26px; }
    .super-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .super-pill { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .super-pill .snum { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .super-pill .sval { font-size: 10px; color: var(--text3); }
    .disclaimer { font-size: 11px; color: var(--text3); text-align: center; padding: 0 20px 32px; line-height: 1.6; }
    main { padding: 0 20px; flex: 1; }
  </style>
</head>
<body>

<div id="splash">
  <div class="logo-big">🎱</div>
  <h1>Baloto Stats</h1>
  <p>Algoritmos estadísticos Colombia</p>
  <div class="bar"><div class="bar-fill"></div></div>
</div>

<div id="app" style="display:none">
  <header>
    <div class="header-top">
      <div class="app-title">🎱 Baloto<span>Stats</span></div>
      <div class="header-badge">● EN VIVO</div>
    </div>
    <div class="game-tabs" id="gameTabs"></div>
  </header>
  <main>
    <div class="game-pill" id="gamePill"></div>
    <div class="section-label">Algoritmo</div>
    <div class="algo-scroll" id="algoScroll"></div>
    <div class="method-box" id="methodBox"></div>
    <div class="controls">
      <div class="qty-wrap">
        <label>Jugadas</label>
        <select id="qty">
          <option>1</option><option selected>3</option><option>5</option><option>10</option>
        </select>
      </div>
      <button class="gen-btn" id="genBtn" onclick="generate()">⚡ Generar</button>
    </div>
    <div id="results"></div>
    <div id="ultimos"></div>
    <div class="stats-section">
      <div class="section-label">Estadísticas históricas</div>
      <div id="statsArea"></div>
    </div>
  </main>
  <p class="disclaimer">⚠️ Uso educativo y entretenimiento. Ningún algoritmo garantiza premios. La lotería es 100% azar. Juega con responsabilidad.</p>
</div>

<script>
const GAMES = {
  baloto:   { name:'Baloto',   emoji:'🎱', mainRange:[1,43], mainCount:5, hasSuper:true,  superRange:[1,16], superLabel:'SuperBalota', superClass:'ball-super-baloto', color:'#4a8fff', desc:'5 números del 1–43', draw:'Lun, Mié y Sáb', prize:'Pozo acumulado' },
  revancha: { name:'Revancha', emoji:'🔄', mainRange:[1,43], mainCount:5, hasSuper:true,  superRange:[1,16], superLabel:'SuperBalota', superClass:'ball-super-baloto', color:'#a78bfa', desc:'Misma cartilla Baloto', draw:'Lun, Mié y Sáb', prize:'Premio fijo' },
  miloto:   { name:'Miloto',   emoji:'⭐', mainRange:[1,39], mainCount:5, hasSuper:false, superRange:null,   superLabel:null,          superClass:null,                color:'#3ecf8e', desc:'5 números del 1–39', draw:'Lun, Mar, Jue y Vie', prize:'Fijo + acumulado' }
};

const ALGOS = [
  {
    id:'frecuencia',
    icon:'🔥',
    name:'Calientes',
    explain:'Prioriza los números con mayor frecuencia histórica acumulada.'
  },

  {
    id:'frio',
    icon:'❄️',
    name:'Fríos',
    explain:'Elige los números menos sorteados históricamente.'
  },

  {
    id:'retrasados',
    icon:'⏳',
    name:'Retrasados',
    explain:'Selecciona números que llevan más sorteos sin aparecer.'
  },

  {
    id:'ia',
    icon:'🤖',
    name:'IA Balanceada',
    explain:'Combina frecuencia, retraso y equilibrio estadístico.'
  },

  {
    id:'mixto',
    icon:'⚖️',
    name:'Mixto',
    explain:'60% calientes + 40% fríos.'
  },

  {
    id:'par_impar',
    icon:'🔢',
    name:'Par/Impar',
    explain:'Distribuye 3 impares y 2 pares.'
  },

  {
    id:'cuadrantes',
    icon:'🗺️',
    name:'Cuadrantes',
    explain:'Garantiza números en distintas zonas.'
  },

  {
    id:'delta',
    icon:'📐',
    name:'Delta',
    explain:'Construye combinaciones usando diferencias típicas.'
  }
];

let currentGame = 'baloto';
let currentAlgo = 'mixto';
let realData = null;
const freqCache = {};

function range(a,b){ return Array.from({length:b-a+1},(_,i)=>i+a); }
function pickRandom(arr,n){ const a=[...arr],r=[]; for(let i=0;i<Math.min(n,a.length);i++){const idx=Math.floor(Math.random()*a.length);r.push(a.splice(idx,1)[0]);} return r; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

async function loadRealData() {
  try {
    const r = await fetch('data/resultados.json?t=' + Date.now());
    realData = await r.json();
    return true;
  } catch(e) {
    return false;
  }
}

function buildFreqsFromReal(gameId, which) {
  const g = GAMES[gameId];
  const pool = which === 'main' ? range(...g.mainRange) : range(...g.superRange);
  const f = {};
  pool.forEach(n => f[n] = 0);
  if (!realData || !realData[gameId]) return simFreqs(pool);
  const sorteos = realData[gameId];
  sorteos.forEach(s => {
    if (which === 'main') {
      (s.numeros || []).forEach(n => { if(f[n] !== undefined) f[n]++; });
    } else {
      if (s.super && f[s.super] !== undefined) f[s.super]++;
    }
  });
  if (sorteos.length < 10) {
    const sim = simFreqs(pool);
    pool.forEach(n => f[n] = (f[n] || 0) + Math.round((sim[n] || 0) * 0.3));
  }
  return f;
}

function simFreqs(pool){
  const f={};
  pool.forEach(n=>f[n]=0);
  for(let i=0;i<600;i++) pickRandom(pool,5).forEach(n=>f[n]++);
  return f;
}

function getFreqs(gameId, which){

  const k = gameId + '_' + which;

  if (!freqCache[k]) {

    ...

  }

  return freqCache[k];

}

function getDelayedNumbers(gameId){

  const g = GAMES[gameId];

  const delays = {};

  for(let n=1;n<=g.mainRange[1];n++){
    delays[n]=999;
  }

  if(!realData || !realData[gameId]){
    return delays;
  }

  const draws = realData[gameId];

  for(let i=0;i<draws.length;i++){

    const nums = draws[i].numeros || [];

    nums.forEach(n=>{

      if(delays[n]===999){
        delays[n]=i;
      }

    });

  }

  return delays;

}

const ALGO_FNS = {
  frecuencia(pool,count,freqs){ const s=[...pool].sort((a,b)=>(freqs[b]||0)-(freqs[a]||0)); return pickRandom(s.slice(0,Math.ceil(pool.length*0.4)),count); },
  frio(pool,count,freqs){       const s=[...pool].sort((a,b)=>(freqs[a]||0)-(freqs[b]||0)); return pickRandom(s.slice(0,Math.ceil(pool.length*0.4)),count); },
  mixto(pool,count,freqs){      const s=[...pool].sort((a,b)=>(freqs[b]||0)-(freqs[a]||0)),h=Math.ceil(pool.length*0.4),hc=Math.ceil(count*0.6),cc=count-hc; return shuffle([...pickRandom(s.slice(0,h),hc),...pickRandom(s.slice(-h),cc)]); },
  par_impar(pool,count){        const ev=pool.filter(n=>n%2===0),od=pool.filter(n=>n%2!==0),no=Math.round(count*0.6),ne=count-no; return shuffle([...pickRandom(od,no),...pickRandom(ev,ne)]); },
  cuadrantes(pool,count){       const mx=Math.max(...pool),qs=Math.ceil(mx/4),qa=[[],[],[],[]]; pool.forEach(n=>qa[Math.min(3,Math.floor((n-1)/qs))].push(n)); const r=[]; qa.forEach(q=>{if(q.length)r.push(...pickRandom(q,1));}); const rem=count-r.length; if(rem>0){const u=pool.filter(n=>!r.includes(n));r.push(...pickRandom(u,Math.min(rem,u.length)));} return r.slice(0,count).sort((a,b)=>a-b); },
retrasados(pool,count){

  const delays = getDelayedNumbers(currentGame);

  const sorted = [...pool]
    .sort((a,b)=>delays[b]-delays[a]);

  return pickRandom(
    sorted.slice(0,Math.ceil(pool.length*0.4)),
    count
  );

},

ia(pool,count,freqs){

  const delays = getDelayedNumbers(currentGame);

  const ranked = [...pool]
    .map(n=>({

      n,

      score:
        ((freqs[n]||0)*0.6)
        +
        ((delays[n]||0)*0.4)

    }))
    .sort((a,b)=>b.score-a.score);

  return pickRandom(
    ranked.slice(0,15).map(x=>x.n),
    count
  );

},
  delta(pool,count){            const mn=Math.min(...pool),mx=Math.max(...pool),td=[1,2,3,3,4,5,6,7,8]; for(let t=0;t<200;t++){const seed=mn+Math.floor(Math.random()*Math.ceil((mx-mn)*0.3)),dl=Array.from({length:count-1},()=>td[Math.floor(Math.random()*td.length)]),nm=[seed]; dl.forEach(d=>nm.push(nm[nm.length-1]+d)); if(nm.every(n=>n>=mn&&n<=mx)&&new Set(nm).size===count)return nm.sort((a,b)=>a-b);} return pickRandom(pool,count).sort((a,b)=>a-b); }
};

function setGame(g){ currentGame=g; Object.keys(freqCache).forEach(k=>{ if(k.startsWith(currentGame)) delete freqCache[k]; }); renderAll(); }
function setAlgo(a){ currentAlgo=a; renderAlgos(); renderMethod(); document.getElementById('results').innerHTML=''; }
function renderAll(){ renderTabs(); renderPill(); renderAlgos(); renderMethod(); renderStats(); renderUltimos(); document.getElementById('results').innerHTML=''; }

function renderTabs(){
  document.getElementById('gameTabs').innerHTML = Object.entries(GAMES).map(([id,g])=>`
    <button class="gtab ${id===currentGame?'active':''}" onclick="setGame('${id}')">
      <span class="tab-emoji">${g.emoji}</span>${g.name}
    </button>`).join('');
}

function renderPill(){
  const g=GAMES[currentGame];
  const upd = realData ? `<div class="pill-item"><strong>📅 Actualizado</strong>${realData.ultima_actualizacion}</div>` : '<div class="pill-item"><strong>⚠️ Modo</strong>Simulación</div>';
  const superPill = g.hasSuper ? `<div class="pill-item"><strong>1 ${g.superLabel}</strong>1–${g.superRange[1]}</div>` : '';
  const count = realData ? (realData[currentGame]||[]).length : 0;
  document.getElementById('gamePill').innerHTML=`
    <div class="pill-item"><strong>${g.mainCount} bolas</strong>${g.desc}</div>
    ${superPill}
    <div class="pill-item"><strong>${g.draw}</strong>Sorteo</div>
    <div class="pill-item"><strong>📊 ${count}</strong>sorteos reales</div>
    ${upd}
  `;
}

function renderAlgos(){
  document.getElementById('algoScroll').innerHTML = ALGOS.map(a=>`
    <div class="algo-chip ${a.id===currentAlgo?'active':''}" onclick="setAlgo('${a.id}')">
      <span class="chip-icon">${a.icon}</span>
      <span class="chip-name">${a.name}</span>
    </div>`).join('');
}

function renderMethod(){
  const a=ALGOS.find(x=>x.id===currentAlgo);
  document.getElementById('methodBox').innerHTML=`<h3>${a.icon} ${a.name}</h3><p>${a.explain}</p>`;
}

function renderUltimos(){
  if (!realData || !realData[currentGame]) return;
  const sorteos = realData[currentGame].slice(0, 5);
  const g = GAMES[currentGame];
  const html = `
    <div class="section-label" style="margin-top:8px">Últimos sorteos reales</div>
    ${sorteos.map(s => `
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--text3);min-width:76px">${s.fecha}</span>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          ${s.numeros.map(n=>`<div class="ball ball-main" style="width:34px;height:34px;font-size:13px">${n}</div>`).join('')}
          ${g.hasSuper && s.super ? `<span style="color:var(--text3);font-size:16px">+</span><div class="ball ${g.superClass}" style="width:36px;height:36px;font-size:13px">${s.super}</div>` : ''}
        </div>
      </div>`).join('')}
  `;
  const el = document.getElementById('ultimos');
  if(el) el.innerHTML = html;
}

function generate(){
  const g=GAMES[currentGame];
  const qty=parseInt(document.getElementById('qty').value);
  const fn=ALGO_FNS[currentAlgo];
  const mainPool=range(...g.mainRange);
  const mf=getFreqs(currentGame,'main');
  const btn=document.getElementById('genBtn');
  btn.textContent='⏳ Calculando...'; btn.disabled=true;
  setTimeout(()=>{
    const combos=[];
    for(let i=0;i<qty;i++){
      const nums=fn(mainPool,g.mainCount,mf).sort((a,b)=>a-b);
      let sup=null, score=0;
      if(g.hasSuper){
        const superPool=range(...g.superRange);
        const sf=getFreqs(currentGame,'super');
        sup=pickRandom(superPool,1)[0];
        score=Math.round((nums.reduce((s,n)=>s+(mf[n]||0),0)/nums.length+(sf[sup]||0))/2);
      } else {
        score=Math.round(nums.reduce((s,n)=>s+(mf[n]||0),0)/nums.length);
      }
      combos.push({nums,sup,score});
    }
    document.getElementById('results').innerHTML=combos.map((c,i)=>`
      <div class="combo-card">
        <div class="combo-top">
          <span class="combo-lbl">Jugada ${i+1}</span>
          <span class="combo-score">📊 Score: ${c.score}</span>
        </div>
        <div class="balls">
          ${c.nums.map(n=>`<div class="ball ball-main">${n}</div>`).join('')}
          ${c.sup!==null?`<span class="ball-sep">+</span><div class="ball ${GAMES[currentGame].superClass}">${c.sup}</div>`:''}
        </div>
      </div>`).join('');
    btn.textContent='⚡ Generar'; btn.disabled=false;
  },300);
}

function renderStats(){
  const g=GAMES[currentGame];
  const mf=getFreqs(currentGame,'main');
  const mainPool=range(...g.mainRange);
  const sorted=[...mainPool].sort((a,b)=>(mf[b]||0)-(mf[a]||0));
  const maxM=Math.max(...mainPool.map(n=>mf[n]||0));
  let superBox='';
  if(g.hasSuper){
    const sf=getFreqs(currentGame,'super');
    const superPool=range(...g.superRange);
    const topS=[...superPool].sort((a,b)=>(sf[b]||0)-(sf[a]||0)).slice(0,6);
    superBox=`
    <div class="stat-box">
      <h3>⭐ ${g.superLabel} frecuentes</h3>
      <div class="super-pills">
        ${topS.map((n,i)=>`<div class="super-pill"><div class="snum ${i<3?g.superClass:'ball-main'}">${n}</div><div class="sval">${sf[n]||0}</div></div>`).join('')}
      </div>
    </div>`;
  }
  document.getElementById('statsArea').innerHTML=`
    <div class="stat-box">
      <h3>🔥 Números más calientes</h3>
      ${sorted.slice(0,6).map(n=>`<div class="freq-row"><span class="freq-n">${n}</span><div class="freq-track"><div class="freq-fill-hot" style="width:${Math.round((mf[n]||0)/maxM*100)}%"></div></div><span class="freq-val">${mf[n]||0}</span></div>`).join('')}
    </div>
    <div class="stat-box">
      <h3>❄️ Números más fríos</h3>
      ${sorted.slice(-6).reverse().map(n=>`<div class="freq-row"><span class="freq-n">${n}</span><div class="freq-track"><div class="freq-fill-cold" style="width:${Math.round((mf[n]||0)/maxM*100)}%"></div></div><span class="freq-val">${mf[n]||0}</span></div>`).join('')}
    </div>
    ${superBox}`;
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

window.addEventListener('load', async () => {
  await loadRealData();
  renderAll();
  setTimeout(()=>{
    const s=document.getElementById('splash');
    s.style.opacity='0';
    setTimeout(()=>{ s.style.display='none'; document.getElementById('app').style.display='flex'; },400);
  },1400);
});
</script>
